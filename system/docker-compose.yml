services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockinvestmentdss-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./runtime-data:/app/runtime-data
    restart: unless-stopped
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockinvestmentdss-frontend
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend
    environment:
      BACKEND_BASE_URL: http://backend:8000
    volumes:
      - ./frontend/app:/app/app
    restart: unless-stopped